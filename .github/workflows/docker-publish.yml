name: Build and publish Docker image

on:
  push:
    tags:
      - 'v*.*.*'         # e.g. v1.0.0  -> publishes 1.0.0, 1.0, 1, latest
  workflow_dispatch:     # allow manual runs (from Actions UI). When triggered
                         # without a SemVer tag, only the README sync runs;
                         # the image build job is skipped on purpose.

env:
  IMAGE_NAME: corosync-qnetd
  REGISTRY: docker.io
  PLATFORMS: linux/amd64,linux/arm64

jobs:
  # ---------------------------------------------------------------------------
  # Job 1: build and publish the multi-arch image.
  # Only runs when a git tag matching v*.*.* is pushed; skipped otherwise.
  # ---------------------------------------------------------------------------
  publish-image:
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU (multi-arch emulation)
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract metadata (tags, labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.IMAGE_NAME }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=raw,value=latest

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          platforms: ${{ env.PLATFORMS }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            VERSION=${{ steps.meta.outputs.version }}
            VCS_REF=${{ github.sha }}
            BUILD_DATE=${{ fromJSON(steps.meta.outputs.json).labels['org.opencontainers.image.created'] }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ---------------------------------------------------------------------------
  # Job 2: sync README.md to the Docker Hub "Overview" page.
  # Runs on tag releases AND on workflow_dispatch — that way you can refresh
  # the Overview after doc-only edits without bumping a SemVer version.
  # Requires DOCKERHUB_TOKEN with "Read, Write, Delete" scope (or the new
  # granular "Modify repository details" permission).
  # ---------------------------------------------------------------------------
  sync-readme:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Update Docker Hub description
        uses: peter-evans/dockerhub-description@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
          repository: ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.IMAGE_NAME }}
          short-description: "External QDevice arbitrator (corosync-qnetd) for 2-node Proxmox VE clusters."
          readme-filepath: ./README.md
